<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker | Sign In</title>
    <!-- Daisy UI & Tailwind CSS -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- My CSS -->
    <link rel="stylesheet" href="./style/style.css">
</head>

<body>
    <section class="w-full sm:w-6/12 md:w-4/12 mx-auto my-8">
        <div class="card w-96 bg-base-100 shadow-lg">
            <div class="card-body">
                <div class="flex justify-center flex-col items-center">
                    <img src="./assets/github-logo.png" alt="">
                    <h3 class="text-2xl font-semibold mt-3">GitHub Issues Tracker</h3>
                    <p class="text-[#64748B]">Sign in to manage your issues</p>
                </div>

                <div>
                    <fieldset class="fieldset w-xs">
                        <label class="font-semibold">Username</label>
                        <input id="username" type="text" class="input rounded-lg" placeholder="Enter Username" />
                        <span class="text-blue-600">Default: admin</span>

                        <label class="font-semibold">Password</label>
                        <input id="password" type="password" class="input rounded-lg" placeholder="Enter Password" />
                        <span class="text-blue-600">Default: admin123</span>
                        <button id="signIn-btn" class="btn btn-primary btn-block mt-4 rounded-lg">Sign In</button>
                    </fieldset>
                </div>

                <div class="flex items-center">
                    <div class="flex-1 h-px bg-gray-300"></div>
                    <span class="px-2 text-gray-700">OR</span>
                    <div class="flex-1 h-px bg-gray-300"></div>
                </div>

                <div class="text-center">
                    <p class="text-[#64748B] mb-1">Demo Credentials:</p>
                    <div class="bg-gray-50 py-4 rounded-lg">
                        <p><b>Username: </b>admin</p>
                        <p><b>Password: </b>admin123</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="./script/login.js"></script>
</body>

</html>
